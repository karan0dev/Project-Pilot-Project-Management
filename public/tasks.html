<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — ProjectPilot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="workspace-page light-mode tasks-page">

  <!-- Background Blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-container">
    <!-- Sidebar Placeholder -->
    <div class="sidebar" id="sidebar-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <div class="page-title-area">
          <h1>Global Tasks</h1>
          <p>Monitor all tasks across your workspace</p>
        </div>
        <div class="header-actions">
          <button class="btn-clay primary" id="open-task-modal">➕ Add Task</button>
        </div>
      </div>

      <!-- Filters Panel -->
      <div class="filter-bar">
        <div class="search-input-wrapper">
          <span class="search-icon-inside">🔍</span>
          <input type="text" id="search-input" class="form-control" placeholder="Search tasks by name or description...">
        </div>
        <div style="width: 150px;">
          <select id="status-filter" class="form-control">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div style="width: 150px;">
          <select id="priority-filter" class="form-control">
            <option value="">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div style="width: 200px;">
          <select id="project-filter" class="form-control">
            <option value="">All Projects</option>
          </select>
        </div>
      </div>

      <!-- Tasks Grid (Bento cards list) -->
      <div class="project-grid" id="tasks-grid-container" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));">
        <p style="color:var(--text-secondary); text-align:center; padding: 50px; grid-column: 1/-1;">Loading tasks directory...</p>
      </div>
    </main>
  </div>

  <!-- Add/Edit Task Modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="task-modal-title">Create Workspace Task</h2>
        <button class="modal-close" id="close-task-modal">&times;</button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label for="task-title">Task Title</label>
          <input type="text" id="task-title" class="form-control" placeholder="e.g. Set up database indices" required>
        </div>
        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" class="form-control" rows="3" placeholder="Describe instructions and target deliverables..." required style="resize:none;"></textarea>
        </div>
        <div class="form-group">
          <label for="task-project">Project Scope</label>
          <select id="task-project" class="form-control" required>
            <option value="">Select Project</option>
          </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority" class="form-control" required>
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-assignee">Assigned To</label>
            <select id="task-assignee" class="form-control" required>
              <option value="">Select Member</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="task-deadline">Deadline</label>
          <input type="date" id="task-deadline" class="form-control" required>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
          <button type="button" class="btn-clay neutral" id="cancel-task-modal">Cancel</button>
          <button type="submit" class="btn-clay primary" id="save-task-btn">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tasksContainer = document.getElementById('tasks-grid-container');
      const taskModal = document.getElementById('task-modal');
      const taskForm = document.getElementById('task-form');
      const taskModalTitle = document.getElementById('task-modal-title');
      
      const searchInput = document.getElementById('search-input');
      const statusFilter = document.getElementById('status-filter');
      const priorityFilter = document.getElementById('priority-filter');
      const projectFilter = document.getElementById('project-filter');
      
      const projectSelect = document.getElementById('task-project');
      const assigneeSelect = document.getElementById('task-assignee');

      // Modal open/close bindings
      document.getElementById('open-task-modal').addEventListener('click', () => openTaskModal());
      document.getElementById('close-task-modal').addEventListener('click', closeTaskModal);
      document.getElementById('cancel-task-modal').addEventListener('click', closeTaskModal);
      
      // Filters listeners
      searchInput.addEventListener('input', fetchTasks);
      statusFilter.addEventListener('change', fetchTasks);
      priorityFilter.addEventListener('change', fetchTasks);
      projectFilter.addEventListener('change', fetchTasks);

      taskForm.addEventListener('submit', handleTaskFormSubmit);

      // Load initial selector data
      loadFilterSelectors();
      fetchTasks();

      // Load dropdown selections
      async function loadFilterSelectors() {
        try {
          // Load projects catalog
          const projectsRes = await API.getProjects();
          if (projectsRes.success) {
            const projects = projectsRes.data;
            
            // Populate filter select
            projectFilter.innerHTML = '<option value="">All Projects</option>' + projects.map(p => `
              <option value="${p._id}">${p.title}</option>
            `).join('');

            // Populate form modal project select
            projectSelect.innerHTML = '<option value="">Select Project</option>' + projects.map(p => `
              <option value="${p._id}">${p.title}</option>
            `).join('');
          }

          // Load assignable team members
          const me = API.getUser();
          if (me) {
            if (me.role === 'admin') {
              const teamRes = await API.getTeamMembers();
              const members = teamRes.success ? teamRes.data : [];
              const assignableUsers = [
                { _id: me._id, username: `${me.username} (You)`, role: 'admin' },
                ...members
              ];
              assigneeSelect.innerHTML = '<option value="">Select Member</option>' + assignableUsers.map(u => `
                <option value="${u._id}">${u.username} (${u.role})</option>
              `).join('');
            } else {
              assigneeSelect.innerHTML = `<option value="">Select Member</option><option value="${me._id}">${me.username} (You)</option>`;
            }
          }
        } catch (error) {
          console.error('Failed to pre-load selectors:', error);
        }
      }

      // Fetch Tasks from API
      async function fetchTasks() {
        const filters = {
          search: searchInput.value.trim(),
          status: statusFilter.value,
          priority: priorityFilter.value,
          projectId: projectFilter.value
        };

        try {
          const response = await API.getTasks(filters);
          if (response.success) {
            renderTasks(response.data);
          }
        } catch (error) {
          tasksContainer.innerHTML = `<p style="color:var(--accent-danger); text-align:center; padding: 50px; grid-column: 1/-1;">Error loading tasks directory: ${API.escapeHtml(error.message)}</p>`;
        }
      }

      // Render Task cards inside Grid
      function renderTasks(tasks) {
        if (!tasks || tasks.length === 0) {
          tasksContainer.innerHTML = `<p style="color:var(--text-secondary); text-align:center; padding: 50px; grid-column: 1/-1;">No tasks found matching current filters.</p>`;
          return;
        }

        tasksContainer.innerHTML = tasks.map(task => {
          const deadlineDate = new Date(task.deadline);
          const formattedDeadline = deadlineDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          const isOverdue = deadlineDate < new Date() && task.status !== 'completed';
          const overdueHtml = isOverdue ? '<span class="overdue-tag">OVERDUE</span>' : '';
          
          const projectTitle = task.projectId ? task.projectId.title : 'Unlinked Project';
          const initials = task.assignedTo ? task.assignedTo.username.substring(0, 2).toUpperCase() : '??';
          const assigneeName = task.assignedTo ? task.assignedTo.username : 'Unassigned';

          // Options to modify status inline via dropdown
          const statusSelector = `
            <select onchange="window.updateTaskStatus('${task._id}', this.value)" style="background:rgba(0,0,0,0.15); border:1px solid var(--glass-border); border-radius:8px; padding:4px 8px; color:var(--text-primary); font-size:0.8rem; cursor:pointer;">
              <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
              <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
            </select>
          `;

          return `
            <div class="bento-card" style="display:flex; flex-direction:column; justify-content:space-between; height: 230px; padding: 20px;">
              <div>
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
                  <span style="font-size:0.75rem; color:var(--accent-secondary); font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">${API.escapeHtml(projectTitle)}</span>
                  <span class="task-priority-badge priority-${task.priority}" style="margin-bottom:0;">${task.priority}</span>
                </div>
                <h3 style="font-size: 1.15rem; font-weight:700; margin-bottom: 6px; color:var(--text-primary);">${API.escapeHtml(task.title)}</h3>
                <p style="font-size:0.85rem; color:var(--text-secondary); line-height: 1.4; display:-webkit-box; -webkit-line-clamp: 2; -webkit-box-orient:vertical; overflow:hidden;">${API.escapeHtml(task.description)}</p>
              </div>

              <div>
                <div style="margin: 10px 0; display:flex; justify-content:space-between; align-items:center;">
                  <span style="font-size: 0.8rem; color:var(--text-secondary); font-weight:600;">Status:</span>
                  ${statusSelector}
                </div>
                <div class="project-card-footer" style="padding-top:10px;">
                  <div class="task-assignee" style="font-size: 0.8rem;">
                    <div class="assignee-avatar">${API.escapeHtml(initials)}</div>
                    <span>${API.escapeHtml(assigneeName)}</span>
                  </div>
                  <div style="display:flex; gap:10px; align-items:center;">
                    <div style="font-size:0.75rem; color:var(--text-secondary);">
                      Due: <b>${formattedDeadline}</b> ${overdueHtml}
                    </div>
                    <div style="display:flex; gap:5px;">
                      <button onclick="window.editTask('${task._id}')" style="background:none; border:none; cursor:pointer; font-size:1rem;" title="Edit Task">✏️</button>
                      <button onclick="window.deleteTask('${task._id}')" style="background:none; border:none; cursor:pointer; font-size:1rem;" title="Delete Task">🗑️</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      // Open Task Modal
      function openTaskModal(task = null) {
        if (task) {
          taskModalTitle.innerText = 'Edit Task Details';
          document.getElementById('task-id').value = task._id;
          document.getElementById('task-title').value = task.title;
          document.getElementById('task-desc').value = task.description;
          document.getElementById('task-project').value = task.projectId ? task.projectId._id : '';
          document.getElementById('task-priority').value = task.priority;
          document.getElementById('task-assignee').value = task.assignedTo ? task.assignedTo._id : '';
          
          const date = new Date(task.deadline);
          document.getElementById('task-deadline').value = date.toISOString().split('T')[0];
        } else {
          taskModalTitle.innerText = 'Create Workspace Task';
          taskForm.reset();
          document.getElementById('task-id').value = '';
          
          // Set default date to tomorrow
          const tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          document.getElementById('task-deadline').value = tomorrow.toISOString().split('T')[0];
        }
        taskModal.classList.add('active');
      }

      // Close Task Modal
      function closeTaskModal() {
        taskModal.classList.remove('active');
        taskForm.reset();
      }

      // Submit Form
      async function handleTaskFormSubmit(e) {
        e.preventDefault();
        
        const taskId = document.getElementById('task-id').value;
        const taskData = {
          title: document.getElementById('task-title').value.trim(),
          description: document.getElementById('task-desc').value.trim(),
          projectId: document.getElementById('task-project').value,
          assignedTo: document.getElementById('task-assignee').value,
          priority: document.getElementById('task-priority').value,
          deadline: document.getElementById('task-deadline').value
        };

        try {
          let response;
          if (taskId) {
            response = await API.updateTask(taskId, taskData);
          } else {
            response = await API.createTask(taskData);
          }

          if (response.success) {
            closeTaskModal();
            fetchTasks();
          }
        } catch (error) {
          alert(`Failed to save task: ${error.message}`);
        }
      }

      // Global window helpers for inline updates, edit, and deletion
      window.updateTaskStatus = async (id, status) => {
        try {
          const response = await API.updateTask(id, { status });
          if (response.success) {
            fetchTasks();
          }
        } catch (error) {
          alert(`Failed to update task status: ${error.message}`);
        }
      };

      window.editTask = async (id) => {
        try {
          const response = await API.getTask(id);
          if (response.success) {
            openTaskModal(response.data);
          }
        } catch (error) {
          alert(`Failed to load task: ${error.message}`);
        }
      };

      window.deleteTask = async (id) => {
        if (confirm('Are you sure you want to delete this task?')) {
          try {
            const response = await API.deleteTask(id);
            if (response.success) {
              fetchTasks();
            }
          } catch (error) {
            alert(`Failed to delete task: ${error.message}`);
          }
        }
      };
    });
  </script>
</body>
</html>
