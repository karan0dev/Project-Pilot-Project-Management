<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — ProjectPilot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="workspace-page light-mode projects-page">

  <!-- Background Blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-container">
    <!-- Sidebar Placeholder -->
    <div class="sidebar" id="sidebar-placeholder"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="page-header">
        <div class="page-title-area">
          <h1>Projects Catalog</h1>
          <p>Create and monitor workspace projects</p>
        </div>
        <div class="header-actions">
          <button class="btn-clay primary" id="open-create-modal">➕ Create Project</button>
        </div>
      </div>

      <!-- Filter/Search Bar -->
      <div class="filter-bar">
        <div class="search-input-wrapper">
          <span class="search-icon-inside">🔍</span>
          <input type="text" id="search-input" class="form-control" placeholder="Search projects by title or description...">
        </div>
        <div style="width: 180px;">
          <select id="status-filter" class="form-control">
            <option value="">All Statuses</option>
            <option value="planning">Planning</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="on_hold">On Hold</option>
          </select>
        </div>
        <div style="width: 180px;">
          <select id="category-filter" class="form-control">
            <option value="">All Categories</option>
            <option value="Development">Development</option>
            <option value="Design">Design</option>
            <option value="Marketing">Marketing</option>
            <option value="Research">Research</option>
            <option value="Operations">Operations</option>
          </select>
        </div>
      </div>

      <!-- Projects Grid -->
      <div class="project-grid" id="projects-grid-container">
        <p style="color:var(--text-secondary); text-align:center; padding: 50px; grid-column: 1/-1;">Loading projects catalog...</p>
      </div>
    </main>
  </div>

  <!-- Create/Edit Project Modal Overlay -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Create New Project</h2>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>
      <form id="project-form">
        <input type="hidden" id="project-id">
        <div class="form-group">
          <label for="title">Project Title</label>
          <input type="text" id="title" class="form-control" placeholder="e.g. Design System V2" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" class="form-control" rows="3" placeholder="Provide project scope and details..." required style="resize: none;"></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" class="form-control" required>
              <option value="Development">Development</option>
              <option value="Design">Design</option>
              <option value="Marketing">Marketing</option>
              <option value="Research">Research</option>
              <option value="Operations">Operations</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" class="form-control" required>
              <option value="planning">Planning</option>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="on_hold">On Hold</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="deadline">Deadline</label>
          <input type="date" id="deadline" class="form-control" required>
        </div>
        <div style="display:flex; justify-content:flex-end; gap: 12px; margin-top: 20px;">
          <button type="button" class="btn-clay neutral" id="cancel-modal">Cancel</button>
          <button type="submit" class="btn-clay primary" id="save-project-btn">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const projectsContainer = document.getElementById('projects-grid-container');
      const projectModal = document.getElementById('project-modal');
      const projectForm = document.getElementById('project-form');
      const modalTitle = document.getElementById('modal-title');
      
      const searchInput = document.getElementById('search-input');
      const statusFilter = document.getElementById('status-filter');
      const categoryFilter = document.getElementById('category-filter');

      // Modal open/close bindings
      document.getElementById('open-create-modal').addEventListener('click', () => {
        openModal();
      });
      document.getElementById('close-modal').addEventListener('click', closeModal);
      document.getElementById('cancel-modal').addEventListener('click', closeModal);

      // Search/Filter bindings
      searchInput.addEventListener('input', fetchProjects);
      statusFilter.addEventListener('change', fetchProjects);
      categoryFilter.addEventListener('change', fetchProjects);

      // Form submit binding
      projectForm.addEventListener('submit', handleFormSubmit);

      // Initial Fetch
      fetchProjects();

      // Fetch Projects from API
      async function fetchProjects() {
        const filters = {
          search: searchInput.value.trim(),
          status: statusFilter.value,
          category: categoryFilter.value
        };

        try {
          const response = await API.getProjects(filters);
          if (response.success) {
            renderProjects(response.data);
          }
        } catch (error) {
          projectsContainer.innerHTML = `<p style="color:var(--accent-danger); text-align:center; padding: 50px; grid-column: 1/-1;">Error loading projects catalog: ${API.escapeHtml(error.message)}</p>`;
        }
      }

      // Render Project list inside Bento layout
      function renderProjects(projects) {
        if (!projects || projects.length === 0) {
          projectsContainer.innerHTML = `<p style="color:var(--text-secondary); text-align:center; padding: 50px; grid-column: 1/-1;">No projects match the filter criteria.</p>`;
          return;
        }

        projectsContainer.innerHTML = projects.map(proj => {
          const statusClass = `status-${proj.status}`;
          const statusText = proj.status.replace('_', ' ');
          const deadlineDate = new Date(proj.deadline);
          const formattedDeadline = deadlineDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          const isOverdue = deadlineDate < new Date() && proj.status !== 'completed';
          const isNearDue = !isOverdue && (deadlineDate - new Date()) / (1000 * 60 * 60 * 24) <= 3 && proj.status !== 'completed';

          let warningHtml = '';
          if (isOverdue) {
            warningHtml = `<span class="overdue-tag">OVERDUE</span>`;
          } else if (isNearDue) {
            warningHtml = `<span class="badge-warning-deadline">📅 Near Deadline</span>`;
          }

          const user = API.getUser();
          // Allow edit/delete only if user is creator or an admin
          const isAuthorized = user && (user.role === 'admin' || proj.createdBy && proj.createdBy._id === user._id);
          const actionsHtml = isAuthorized ? `
            <div style="display:flex; gap: 8px;">
              <button onclick="event.stopPropagation(); window.editProject('${proj._id}')" style="background:none; border:none; cursor:pointer; font-size:1.1rem;" title="Edit Project">✏️</button>
              <button onclick="event.stopPropagation(); window.deleteProject('${proj._id}')" style="background:none; border:none; cursor:pointer; font-size:1.1rem;" title="Delete Project">🗑️</button>
            </div>
          ` : '';

          return `
            <div class="bento-card project-card" onclick="window.location.href='/project-details?id=${proj._id}'">
              <div>
                <div class="project-card-header">
                  <span class="project-category">${API.escapeHtml(proj.category)}</span>
                  <span class="project-status-badge ${statusClass}">${statusText}</span>
                </div>
                <div class="project-card-body">
                  <h3>${API.escapeHtml(proj.title)}</h3>
                  <p>${API.escapeHtml(proj.description)}</p>
                </div>
              </div>
              <div>
                <div style="margin-bottom: 12px;">
                  <div style="display:flex; justify-content:space-between; font-size: 0.8rem; margin-bottom: 5px; font-weight:600;">
                    <span>Project Progress</span>
                    <span style="color:var(--accent-secondary);">${proj.progress}%</span>
                  </div>
                  <div class="progress-container" style="height: 8px; margin-top:0;">
                    <div class="progress-bar" style="width: ${proj.progress}%;"></div>
                  </div>
                </div>
                <div class="project-card-footer">
                  <div style="font-size:0.75rem; color:var(--text-secondary);">
                    <span>Due: <b>${formattedDeadline}</b></span>
                    ${warningHtml}
                  </div>
                  ${actionsHtml}
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      // Open Modal
      function openModal(project = null) {
        if (project) {
          modalTitle.innerText = 'Edit Project Details';
          document.getElementById('project-id').value = project._id;
          document.getElementById('title').value = project.title;
          document.getElementById('description').value = project.description;
          document.getElementById('category').value = project.category;
          document.getElementById('status').value = project.status;
          
          // Format date for input [YYYY-MM-DD]
          const date = new Date(project.deadline);
          document.getElementById('deadline').value = date.toISOString().split('T')[0];
        } else {
          modalTitle.innerText = 'Create New Project';
          projectForm.reset();
          document.getElementById('project-id').value = '';
          
          // Set default date to 1 week from now
          const oneWeek = new Date();
          oneWeek.setDate(oneWeek.getDate() + 7);
          document.getElementById('deadline').value = oneWeek.toISOString().split('T')[0];
        }
        projectModal.classList.add('active');
      }

      // Close Modal
      function closeModal() {
        projectModal.classList.remove('active');
        projectForm.reset();
      }

      // Submit new/edited project details
      async function handleFormSubmit(e) {
        e.preventDefault();
        
        const projectId = document.getElementById('project-id').value;
        const projectData = {
          title: document.getElementById('title').value.trim(),
          description: document.getElementById('description').value.trim(),
          category: document.getElementById('category').value,
          status: document.getElementById('status').value,
          deadline: document.getElementById('deadline').value
        };

        try {
          let response;
          if (projectId) {
            response = await API.updateProject(projectId, projectData);
          } else {
            response = await API.createProject(projectData);
          }

          if (response.success) {
            closeModal();
            fetchProjects();
          }
        } catch (error) {
          alert(`Failed to save project details: ${error.message}`);
        }
      }

      // Expose globally for click handlers
      window.editProject = async (id) => {
        try {
          const response = await API.getProject(id);
          if (response.success) {
            openModal(response.project);
          }
        } catch (error) {
          alert(`Failed to retrieve project details: ${error.message}`);
        }
      };

      window.deleteProject = async (id) => {
        if (confirm('WARNING: Deleting this project will permanently delete all tasks associated with it. Are you sure you want to proceed?')) {
          try {
            const response = await API.deleteProject(id);
            if (response.success) {
              fetchProjects();
            }
          } catch (error) {
            alert(`Failed to delete project: ${error.message}`);
          }
        }
      };
    });
  </script>
</body>
</html>
